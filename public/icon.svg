<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gold accent bar -->
  <rect x="0" y="0" width="10" height="512" rx="5" fill="url(#gold)"/>
  <!-- Circle decoration -->
  <circle cx="380" cy="140" r="110" fill="#334155" opacity="0.4"/>
  <!-- S letter -->
  <text x="200" y="330" font-family="Arial Black, Arial, sans-serif" font-size="290" font-weight="900" fill="url(#gold)" text-anchor="middle" dominant-baseline="alphabetic">S</text>
  <!-- PRO label -->
  <rect x="110" y="370" width="180" height="52" rx="26" fill="#f59e0b" opacity="0.18"/>
  <rect x="110" y="370" width="180" height="52" rx="26" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="405" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fbbf24" text-anchor="middle">Trainer Pro</text>
</svg>
